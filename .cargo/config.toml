[build]
target = "riscv64gc-unknown-none-elf"

# NOTE: the kernel's linker-script flags used to live here as
# `target.<triple>.rustflags`, but that caused them to leak into the
# userspace sub-workspace at `crates/`. Cargo concatenates
# `target.*.rustflags` across every config file on the walk from CWD
# to `$HOME`, which meant hello-user was being linked with
# `-Tsrc/arch/riscv64/linker.ld` appended to its own `-Tlinker.ld`.
# The kernel build.rs now emits those link args via
# `cargo:rustc-link-arg=`, keeping them scoped to this one crate.

[target.riscv64gc-unknown-none-elf]
runner = "qemu-system-riscv64 -machine virt -nographic -bios default -serial mon:stdio -kernel"

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
